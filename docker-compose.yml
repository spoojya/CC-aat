version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: cloud-log-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: cloudlogdb
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: cloud-log-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/cloudlogdb
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: cloud-log-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
